name: Deploy WP theme (wordplate) to djur.smadjurschansen.se

on:
  push:
    branches: ["main"]
    paths:
      - "public/themes/wordplate/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy theme via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASS }}
          port: ${{ secrets.DEPLOY_PORT }}
          protocol: sftp

          local-dir: public/themes/wordplate/
          server-dir: ${{ secrets.DEPLOY_PATH }}

          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.DS_Store